<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 7 - Funções em JavaScript</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            margin: 0;
            padding: 20px;
            color: #e0e0e0;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background-color: #2a2a2a;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #ffffff;
        }

        .bloco {
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            background-color: #1f1f1f;
        }

        h2 {
            margin-top: 0;
            font-size: 20px;
            color: #ffffff;
        }

        input {
            display: block;
            width: 100%;
            max-width: 300px;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #555;
            border-radius: 6px;
            background-color: #121212;
            color: #ffffff;
        }

        input:focus {
            outline: none;
            border-color: #e53935;
        }

        button {
            padding: 10px 16px;
            background-color: #e53935;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 8px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #c62828;
        }

        .resultado {
            margin-top: 12px;
            font-weight: bold;
            color: #f5f5f5;
            background-color: #121212;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 12px;
            min-height: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Atividade 7 - JavaScript</h1>

        <div class="bloco">
            <h2>1) Retornar o maior de três números</h2>
            <input type="number" id="num1_1" placeholder="Primeiro número">
            <input type="number" id="num2_1" placeholder="Segundo número">
            <input type="number" id="num3_1" placeholder="Terceiro número">
            <button onclick="mostrarMaior()">Ver maior</button>
            <div class="resultado" id="resultado1"></div>
        </div>

        <div class="bloco">
            <h2>2) Colocar três números em ordem crescente</h2>
            <input type="number" id="num1_2" placeholder="Primeiro número">
            <input type="number" id="num2_2" placeholder="Segundo número">
            <input type="number" id="num3_2" placeholder="Terceiro número">
            <button onclick="mostrarOrdem()">Ordenar</button>
            <div class="resultado" id="resultado2"></div>
        </div>

        <div class="bloco">
            <h2>3) Verificar se uma string é palíndromo</h2>
            <input type="text" id="textoPalindromo" placeholder="Digite uma palavra ou frase">
            <button onclick="mostrarPalindromo()">Verificar</button>
            <div class="resultado" id="resultado3"></div>
        </div>

        <div class="bloco">
            <h2>4) Verificar se a segunda palavra é subconjunto da primeira</h2>
            <input type="text" id="palavra1" placeholder="Primeira palavra">
            <input type="text" id="palavra2" placeholder="Segunda palavra">
            <button onclick="mostrarSubconjunto()">Verificar</button>
            <div class="resultado" id="resultado4"></div>
        </div>

        <div class="bloco">
            <h2>5) Receber uma data e devolver o dia da semana</h2>
            <input type="date" id="dataSemana">
            <button onclick="mostrarDiaSemana()">Ver dia da semana</button>
            <div class="resultado" id="resultado5"></div>
        </div>
    </div>

    <script>


        // 1) Função que retorna o maior de três números
        function maiorNumero(a, b, c) {
            return Math.max(a, b, c);
        }

        function mostrarMaior() {
            let a = Number(document.getElementById("num1_1").value);
            let b = Number(document.getElementById("num2_1").value);
            let c = Number(document.getElementById("num3_1").value);

            document.getElementById("resultado1").innerHTML =
                "O maior número é: " + maiorNumero(a, b, c);
        }

        // 2) Função que retorna três números em ordem crescente
        function ordemCrescente(a, b, c) {
            let numeros = [a, b, c];
            numeros.sort(function (x, y) {
                return x - y;
            });
            return numeros;
        }

        function mostrarOrdem() {
            let a = Number(document.getElementById("num1_2").value);
            let b = Number(document.getElementById("num2_2").value);
            let c = Number(document.getElementById("num3_2").value);

            let resultado = ordemCrescente(a, b, c);
            document.getElementById("resultado2").innerHTML =
                "Ordem crescente: " + resultado.join(", ");
        }

        // 3) Função para verificar palíndromo
        function ehPalindromo(texto) {
            let textoTratado = texto.toLowerCase().replace(/\s+/g, "");
            let invertido = textoTratado.split("").reverse().join("");
            return textoTratado === invertido;
        }

        function mostrarPalindromo() {
            let texto = document.getElementById("textoPalindromo").value;

            if (ehPalindromo(texto)) {
                document.getElementById("resultado3").innerHTML =
                    "É um palíndromo.";
            } else {
                document.getElementById("resultado3").innerHTML =
                    "Não é um palíndromo.";
            }
        }

        // 4) Função para verificar subconjunto
        function verificarSubconjunto(palavra1, palavra2) {
            if (
                palavra1 === undefined || palavra2 === undefined ||
                palavra1.trim() === "" || palavra2.trim() === ""
            ) {
                return "erro";
            }

            let p1 = palavra1.toLowerCase();
            let p2 = palavra2.toLowerCase();

            if (p1.includes(p2)) {
                return "é um subconjunto";
            } else {
                return "não é um subconjunto";
            }
        }

        function mostrarSubconjunto() {
            let palavra1 = document.getElementById("palavra1").value;
            let palavra2 = document.getElementById("palavra2").value;

            document.getElementById("resultado4").innerHTML =
                verificarSubconjunto(palavra1, palavra2);
        }

        // 5) Função para devolver o dia da semana
        function diaDaSemana(data) {
            let dias = [
                "Domingo",
                "Segunda-feira",
                "Terça-feira",
                "Quarta-feira",
                "Quinta-feira",
                "Sexta-feira",
                "Sábado"
            ];

            let dataObj = new Date(data + "T00:00:00");
            return dias[dataObj.getDay()];
        }

        function mostrarDiaSemana() {
            let data = document.getElementById("dataSemana").value;

            if (data === "") {
                document.getElementById("resultado5").innerHTML =
                    "Por favor, selecione uma data.";
                return;
            }

            document.getElementById("resultado5").innerHTML =
                "Dia da semana: " + diaDaSemana(data);
        }
    </script>
</body>

</html>
