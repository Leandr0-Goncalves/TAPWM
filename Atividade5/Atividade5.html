<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pesquisa de Filme</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        padding: 20px;
      }

      .container {
        max-width: 500px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
      }

      h1,
      h2 {
        text-align: center;
      }

      label {
        display: block;
        margin-top: 12px;
        font-weight: bold;
      }

      input,
      select,
      button {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        box-sizing: border-box;
      }

      button {
        margin-top: 15px;
        cursor: pointer;
      }

      #resultado {
        margin-top: 20px;
        background: #eeeeee;
        padding: 15px;
        border-radius: 8px;
        white-space: pre-line;
      }

      #status {
        margin-top: 15px;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Pesquisa de Opinião</h1>
      <h2>Cadastro de 45 pessoas</h2>

      <form id="formPesquisa">
        <label for="idade">Idade:</label>
        <input type="number" id="idade" min="1" required />

        <label for="sexo">Sexo:</label>
        <select id="sexo" required>
          <option value="">Selecione</option>
          <option value="M">Masculino</option>
          <option value="F">Feminino</option>
          <option value="O">Outros</option>
        </select>

        <label for="opiniao">Opinião:</label>
        <select id="opiniao" required>
          <option value="">Selecione</option>
          <option value="4">Ótimo</option>
          <option value="3">Bom</option>
          <option value="2">Regular</option>
          <option value="1">Péssimo</option>
        </select>

        <button type="submit">Salvar pessoa</button>
      </form>

      <div id="status"></div>
      <div id="resultado"></div>
    </div>
  </body>

  <script>
    let totalPessoas = 45;
    let pessoaAtual = 1;

    let somaIdade = 0;
    let maisVelha = 0;
    let maisNova = Infinity;

    let pessimo = 0;
    let otimoBom = 0;

    let homens = 0;
    let mulheres = 0;
    let outros = 0;

    const form = document.getElementById("formPesquisa");
    const status = document.getElementById("status");
    const resultado = document.getElementById("resultado");

    status.innerHTML =
      "<p><strong>Preenchendo dados da pessoa 1 de " +
      totalPessoas +
      "</strong></p>";

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      let idade = parseInt(document.getElementById("idade").value);
      let sexo = document.getElementById("sexo").value;
      let opiniao = parseInt(document.getElementById("opiniao").value);

      somaIdade += idade;

      if (idade > maisVelha) {
        maisVelha = idade;
      }

      if (idade < maisNova) {
        maisNova = idade;
      }

      if (opiniao === 1) {
        pessimo++;
      }

      if (opiniao === 4 || opiniao === 3) {
        otimoBom++;
      }

      if (sexo === "M") {
        homens++;
      } else if (sexo === "F") {
        mulheres++;
      } else {
        outros++;
      }

      if (pessoaAtual < totalPessoas) {
        pessoaAtual++;
        status.innerHTML =
          "<p><strong>Preenchendo dados da pessoa " +
          pessoaAtual +
          " de " +
          totalPessoas +
          "</strong></p>";
        form.reset();
      } else {
        let mediaIdade = somaIdade / totalPessoas;
        let porcentagemOtimoBom = (otimoBom / totalPessoas) * 100;

        resultado.innerHTML =
          "<h3>Resultado final</h3>" +
          "<p><strong>Média das idades:</strong> " +
          mediaIdade.toFixed(2) +
          "</p>" +
          "<p><strong>Idade da pessoa mais velha:</strong> " +
          maisVelha +
          "</p>" +
          "<p><strong>Idade da pessoa mais nova:</strong> " +
          maisNova +
          "</p>" +
          "<p><strong>Quantidade que respondeu péssimo:</strong> " +
          pessimo +
          "</p>" +
          "<p><strong>Porcentagem que respondeu ótimo ou bom:</strong> " +
          porcentagemOtimoBom.toFixed(2) +
          "%</p>" +
          "<p><strong>Homens:</strong> " +
          homens +
          "</p>" +
          "<p><strong>Mulheres:</strong> " +
          mulheres +
          "</p>" +
          "<p><strong>Outros:</strong> " +
          outros +
          "</p>";

        status.innerHTML = "<p><strong>Pesquisa finalizada.</strong></p>";
        form.style.display = "none";
      }
    });
  </script>
</html>
