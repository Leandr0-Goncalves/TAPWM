<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificação de Triângulo</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            margin: 0;
            padding: 0;
            color: #e0e0e0;
        }

        .container {
            width: 400px;
            max-width: 90%;
            margin: 60px auto;
            background-color: #2a2a2a;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #ffffff;
        }

        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
            color: #cccccc;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            box-sizing: border-box;
            border: 1px solid #444;
            border-radius: 6px;
            background-color: #1e1e1e;
            color: #ffffff;
        }

        input:focus {
            outline: none;
            border-color: #e53935;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            border: none;
            background-color: #e53935;
            /* vermelho */
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #c62828;
        }

        #resultado {
            margin-top: 20px;
            padding: 15px;
            background-color: #1e1e1e;
            border-radius: 6px;
            min-height: 40px;
            line-height: 1.5;
            border: 1px solid #444;
        }

        strong {
            color: #ff5252;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Tipo de Triângulo</h1>

        <label for="ladoA">Lado A:</label>
        <input type="number" id="ladoA" step="any" min="0">

        <label for="ladoB">Lado B:</label>
        <input type="number" id="ladoB" step="any" min="0">

        <label for="ladoC">Lado C:</label>
        <input type="number" id="ladoC" step="any" min="0">

        <button onclick="verificarTriangulo()">Verificar</button>

        <div id="resultado"></div>
    </div>

    <script>
        function verificarTriangulo() {
            const a = parseFloat(document.getElementById("ladoA").value);
            const b = parseFloat(document.getElementById("ladoB").value);
            const c = parseFloat(document.getElementById("ladoC").value);
            const resultado = document.getElementById("resultado");

            if (isNaN(a) || isNaN(b) || isNaN(c)) {
                resultado.innerHTML = "Por favor, digite apenas números nos três campos.";
                return;
            }

            if (a <= 0 || b <= 0 || c <= 0) {
                resultado.innerHTML = "Os lados devem ser maiores que zero.";
                return;
            }

            if (a < b + c && b < a + c && c < a + b) {
                if (a === b && b === c) {
                    resultado.innerHTML = "Forma um triângulo.<br>Tipo: <strong>Equilátero</strong>.";
                } else if (a === b || a === c || b === c) {
                    resultado.innerHTML = "Forma um triângulo.<br>Tipo: <strong>Isósceles</strong>.";
                } else {
                    resultado.innerHTML = "Forma um triângulo.<br>Tipo: <strong>Escaleno</strong>.";
                }
            } else {
                resultado.innerHTML = "Os valores informados não formam um triângulo.";
            }
        }
    </script>

</body>

</html>
